[registry]
name = "trusted-network-registry"
ttl_seconds = 3600

[[static_entries]]
id = "admin-static-example"
cidr = "198.51.100.42/24"
source_ref = "static-admin"
status = "active"

[[static_entries]]
id = "admin-static-ipv6-example"
cidr = "2001:db8:100::42/64"
source_ref = "static-admin-ipv6"
status = "active"

[meraki]
enabled = true
fixture_path = "../tests/fixtures/sanitized/meraki-uplinks.example.json"

[publish]
target = "local_file"
local_path = "../registry.example.generated.json"
tfvars_path = "../trusted-registry.auto.tfvars.json"
