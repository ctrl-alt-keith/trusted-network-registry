services:
  publisher:
    image: trusted-network-registry:local
    command:
      - trusted-network-registry
      - publish
      - --once
      - --config
      - /config/config.toml
    env_file:
      - publisher.env
    volumes:
      - ./config.toml:/config/config.toml:ro
      - ./out:/out
    restart: "no"
